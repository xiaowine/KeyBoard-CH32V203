name: Build MCU Project

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Build Essentials
        run: |
          sudo apt-get install -y --no-install-recommends cmake build-essential jq xz-utils tar pkg-config
          cmake --version

      - name: Cache Toolchain
        id: cache-mrs
        uses: actions/cache@v5
        with:
          path: ./mrs_toolchain
          key: mrs-v240-linux-x64

      - name: Download and Extract Toolchain
        if: steps.cache-mrs.outputs.cache-hit != 'true'
        run: |
          mkdir -p ./temp_download
          mkdir -p ./mrs_toolchain
          
          echo "Downloading toolchain..."
          curl -L "https://github.com/xiaowine/xiaowine/releases/download/MounRiverStudio_Linux_X64_V240/MRS_Toolchain_Linux_X64_V240.tar.xz" -o toolchain.tar.xz
          
          echo "Extracting .tar.xz..."
          tar -xJf toolchain.tar.xz -C ./temp_download
          
          # 处理嵌套的 .tar 文件
          INNER_TAR=$(find ./temp_download -name "*.tar" -print -quit)
          if [ -n "$INNER_TAR" ]; then
            echo "Extracting nested tar: $INNER_TAR"
            tar -xf "$INNER_TAR" -C ./temp_download
          fi
          
          # 关键步骤：动态寻找包含 'RISC-V Embedded GCC15' 的目录
          # 我们寻找该目录下是否存在 bin 文件夹
          TARGET_PATH=$(find ./temp_download -type d -path "*/RISC-V Embedded GCC15" -print -quit)
          
          if [ -z "$TARGET_PATH" ]; then
            echo "Error: Could not find Toolchain directory!"
            ls -R ./temp_download
            exit 1
          fi
          
          echo "Found toolchain at: $TARGET_PATH"
          # 将真正的内容移动到 mrs_toolchain 根目录，方便后续使用
          cp -r "$TARGET_PATH/." ./mrs_toolchain/
          rm -rf ./temp_download toolchain.tar.xz

      - name: Configure and Build
        run: |
          # 关键：将解压后的绝对路径传给环境变量 TOOLCHAIN_FOLDER
          export TOOLCHAIN_FOLDER=$(pwd)/mrs_toolchain
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release -j$(nproc)

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event.repository.name }}-build
          path: |
            build/*.elf
            build/*.hex
            build/*.bin
            build/*.map
            build/*.lst